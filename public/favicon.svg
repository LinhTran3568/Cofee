<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Bean body gradient: rich 3D brown -->
    <radialGradient id="beanGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#c47a4a"/>
      <stop offset="40%" stop-color="#7b3a1e"/>
      <stop offset="100%" stop-color="#3d1710"/>
    </radialGradient>

    <!-- Highlight gradient -->
    <radialGradient id="highlight" cx="38%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#e8a06a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c47a4a" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#1a0a00" flood-opacity="0.6"/>
    </filter>

    <!-- Crease glow -->
    <filter id="crease">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bean body (rotated ellipse) — enlarged to fill the icon -->
  <g transform="rotate(-25, 50, 50)">
    <ellipse cx="50" cy="50" rx="32" ry="46" fill="url(#beanGrad)" filter="url(#shadow)"/>

    <!-- Highlight overlay -->
    <ellipse cx="50" cy="50" rx="32" ry="46" fill="url(#highlight)"/>

    <!-- Center crease (dark line) -->
    <path d="M 50 6 C 44 22, 56 38, 50 62 C 47 76, 50 88, 50 94"
          stroke="#2a0d06" stroke-width="3" fill="none"
          stroke-linecap="round" opacity="0.9" filter="url(#crease)"/>

    <!-- Crease edge light -->
    <path d="M 52 6 C 46 22, 58 38, 52 62 C 49 76, 52 88, 52 94"
          stroke="#c47a4a" stroke-width="1.2" fill="none"
          stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Rim light (bottom-right glow) -->
  <ellipse cx="64" cy="68" rx="16" ry="10" fill="#7b3a1e" opacity="0.2" transform="rotate(-25, 64, 68)"/>
</svg>